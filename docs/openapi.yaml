openapi: 3.0.0
info:
  title: Inventory Management API
  version: 1.0.0

servers:
  - url: http://localhost:3000

paths:

  /api/auth/signup:
    post:
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: charlotte@example.com
              password: Password123!
      responses:
        '201':
          description: User created
          content:
            application/json:
              example:
                id: 1
                email: user@example.com
        '400':
          description: Invalid input 
        '409':
          description: Email already in use

  /api/auth/login:
    post:
      summary: Login and get JWT
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: user@example.com
              password: Password123!
      responses:
        '200':
          description: JWT returned
          content:
            application/json:
              example:
                token: "jwt_token_here"
        '400':
          description: Invalid input
        '401':
          description: Invalid credentials

  /api/categories:
    get:
      summary: Get all categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                - id: 1
                  name: Electronics
        '401':
          description: Unauthorized

    post:
      summary: Create a category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Electronics
      responses:
        '201':
          description: Category created
          content:
            application/json:
              example:
                id: 1
                name: Electronics
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /api/categories/{id}:
    get:
      summary: Get category by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                id: 1
                name: Electronics
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
        '404':
          description: Not found

    put:
      summary: Update category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            example:
              name: Updated Category
      responses:
        '200':
          description: Updated
          content:
            application/json:
              example:
                id: 1
                name: Updated Category
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      summary: Delete category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /api/products:
    get:
      summary: Get all products
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                - id: 1
                  name: Laptop
                  price: 1200
                  quantity: 10
                  categoryId: 1
        '401':
          description: Unauthorized

    post:
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            example:
              name: Laptop
              price: 1200
              quantity: 10
              categoryId: 1
      responses:
        '201':
          description: Product created
          content:
            application/json:
              example:
                id: 1
                name: Laptop
                price: 1200
                quantity: 10
                categoryId: 1
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /api/products/{id}:
    get:
      summary: Get product by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
        '404':
          description: Not found

    put:
      summary: Update product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            example:
              name: Updated Laptop
      responses:
        '200':
          description: Updated
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      summary: Delete product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /api/orders:
    get:
      summary: Get all orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized

    post:
      summary: Create order
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            example:
              items:
                - productId: 1
                  quantity: 2
      responses:
        '201':
          description: Order created
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /api/orders/{id}:
    get:
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      summary: Delete order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT